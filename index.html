<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="0; url=/lumentech-erp.html">
  <link rel="canonical" href="/lumentech-erp.html">
  <title>Lumentech® · Sistema de gestão</title>
  <style>
    body { margin:0; font-family:system-ui,sans-serif; background:#FAF8F5; color:#0F172A; display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .loading { text-align:center; }
    .loading-text { font-size:14px; color:#6B7280; margin-top:12px; letter-spacing:.04em; text-transform:uppercase; }
    .spin { width:32px; height:32px; border:2px solid #E5E7EB; border-top-color:#0F172A; border-radius:50%; margin:0 auto; animation:spin .8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
  <div class="loading">
    <div class="spin"></div>
    <div class="loading-text">Carregando Lumentech</div>
  </div>
  <script>window.location.replace('/lumentech-erp.html');</script>
</body>
</html>
